<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Formatos de Criativos v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');

:root {
  --bg: #0c0c0c;
  --surface: #141414;
  --card: #1a1a1a;
  --border: #252525;
  --border2: #333;
  --red: #e63946;
  --yellow: #f4c542;
  --green: #3ddc84;
  --blue: #5bc8f5;
  --purple: #c084fc;
  --orange: #fb923c;
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(12,12,12,0.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--red); white-space: nowrap; }
.logo span { color: var(--text); }
.search {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 14px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; width: 220px; outline: none;
  transition: border-color 0.2s;
}
.search:focus { border-color: var(--red); }
.search::placeholder { color: var(--muted2); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.badge {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
}

/* FILTERS */
.filters {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; padding: 5px 12px; border-radius: 4px;
  border: 1px solid var(--border); color: var(--muted); cursor: pointer;
  transition: all 0.15s; background: transparent; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

/* MAIN */
.main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }

/* HERO */
.hero { margin-bottom: 36px; }
.hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 60px; letter-spacing: 2px; line-height: 0.9; margin-bottom: 8px; }
.hero-title em { color: var(--red); font-style: normal; }
.hero-sub { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 520px; }
.hero-sub strong { color: #aaa; }

/* STATS */
.stats { display: flex; gap: 2px; margin-bottom: 36px; }
.stat-item { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 14px 18px; }
.stat-item:first-child { border-radius: 8px 0 0 8px; }
.stat-item:last-child { border-radius: 0 8px 8px 0; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--red); line-height: 1; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Mono', monospace; }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }

/* FORMAT CARD */
.fcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: flex; flex-direction: column;
}
.fcard:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.fcard-top-bar { height: 3px; background: var(--c, var(--red)); }

.fcard-header {
  padding: 16px 18px 12px;
  cursor: pointer;
}
.fcard-toprow {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.fcard-num { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--c, var(--red)); letter-spacing: 1.5px; text-transform: uppercase; }
.fcard-icon { font-size: 16px; }
.fcard-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; line-height: 1.1; margin-bottom: 6px; }
.fcard-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }
.fcard-footer { display: flex; align-items: center; justify-content: space-between; }
.sub-count { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); }
.toggle-arrow { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted2); transition: transform 0.25s; }
.fcard.open .toggle-arrow { transform: rotate(180deg); }

/* SUBS */
.sub-list { display: none; flex-direction: column; border-top: 1px solid var(--border); }
.fcard.open .sub-list { display: flex; }

.sub-item { padding: 11px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
.sub-item:last-child { border-bottom: none; }
.sub-item:hover { background: rgba(255,255,255,0.025); }

.sub-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.sub-nn { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); flex-shrink: 0; margin-top: 2px; }
.sub-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
.sub-arr { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); flex-shrink: 0; transition: transform 0.2s; }
.sub-item.open .sub-arr { transform: rotate(180deg); }

.sub-body { display: none; margin-top: 10px; display: none; flex-direction: column; gap: 10px; }
.sub-item.open .sub-body { display: flex; }

.drow { display: flex; flex-direction: column; gap: 3px; }
.dk { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted2); }
.dv { font-size: 12px; color: #bbb; line-height: 1.65; }
.hook-box {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-left: 2px solid var(--c, var(--red));
  border-radius: 4px; padding: 9px 12px;
  font-size: 12px; font-style: italic; color: #c0c0c0; line-height: 1.6;
}
.tipo-pill {
  display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px;
  font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 3px; border: 1px solid; margin-top: 2px;
}
.t-video { color: #5bc8f5; border-color: rgba(91,200,245,0.3); background: rgba(91,200,245,0.07); }
.t-imagem { color: #c084fc; border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.07); }
.t-misto { color: #3ddc84; border-color: rgba(61,220,132,0.3); background: rgba(61,220,132,0.07); }

/* empty */
.empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 80px 0; font-size: 14px; }

/* HL */
.hl { background: rgba(230,57,70,0.3); border-radius: 2px; padding: 0 1px; }
</style>
</head>

let activeFilter = 'all';
let searchTerm = '';
let openCards = new Set();
let openSubs = new Set();

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function doSearch(){
  searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
  if(searchTerm) F.forEach(f => openCards.add(f.id));
  render();
}

function toggleCard(id){
  openCards.has(id) ? openCards.delete(id) : openCards.add(id);
  render();
}

function toggleSub(key,e){
  e.stopPropagation();
  openSubs.has(key) ? openSubs.delete(key) : openSubs.add(key);
  render();
}

function hl(t){
  if(!searchTerm) return t;
  return t.replace(new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<span class="hl">$1</span>');
}

function matches(f){
  if(activeFilter === 'video' && !f.tipos.includes('video')) return false;
  if(activeFilter === 'imagem' && !f.tipos.includes('imagem')) return false;
  if(activeFilter === 'misto' && !f.tipos.includes('misto')) return false;
  if(activeFilter === 'topo' && !f.funil.includes('topo')) return false;
  if(activeFilter === 'meio' && !f.funil.includes('meio')) return false;
  if(activeFilter === 'fundo' && !f.funil.includes('fundo')) return false;
  if(!searchTerm) return true;
  return f.name.toLowerCase().includes(searchTerm) ||
    f.desc.toLowerCase().includes(searchTerm) ||
    f.subs.some(s => s.name.toLowerCase().includes(searchTerm) || s.quando.toLowerCase().includes(searchTerm) || s.hook.toLowerCase().includes(searchTerm));
}

function render(){
  const grid = document.getElementById('grid');
  const filtered = F.filter(matches);
  grid.innerHTML = '';

  if(!filtered.length){
    grid.innerHTML = '<div class="empty">Nenhum formato encontrado.</div>';
    return;
  }

  filtered.forEach(f => {
    const isOpen = openCards.has(f.id);
    const div = document.createElement('div');
    div.className = 'fcard' + (isOpen ? ' open' : '');

    const subsHtml = f.subs.map((s,i) => {
      const key = `${f.id}-${i}`;
      const isSubOpen = openSubs.has(key);
      return `<div class="sub-item${isSubOpen?' open':''}" onclick="toggleSub('${key}',event)">
        <div class="sub-row">
          <span class="sub-nn">0${i+1}</span>
          <span class="sub-name">${hl(s.name)}</span>
          <span class="sub-arr">▾</span>
        </div>
        <div class="sub-body">
          <div class="drow"><span class="tipo-pill t-${s.tipo}">${s.tipo}</span></div>
          <div class="drow"><span class="dk">Quando usar</span><span class="dv">${hl(s.quando)}</span></div>
          <div class="drow"><span class="dk">Estrutura</span><span class="dv">${hl(s.estrutura)}</span></div>
          <div class="drow"><span class="dk">Hook exemplo</span><div class="hook-box" style="border-left-color:${f.color}">${hl(s.hook)}</div></div>
          <div class="drow"><span class="dk">Dica de produção</span><span class="dv">${hl(s.dica)}</span></div>
        </div>
      </div>`;
    }).join('');

    div.innerHTML = `
      <div class="fcard-top-bar" style="--c:${f.color}"></div>
      <div class="fcard-header" onclick="toggleCard(${f.id})">
        <div class="fcard-toprow">
          <span class="fcard-num" style="color:${f.color}">FORMATO ${String(f.id).padStart(2,'0')}</span>
          <span class="fcard-icon">${f.icon}</span>
        </div>
        <div class="fcard-name">${hl(f.name)}</div>
        <div class="fcard-desc">${hl(f.desc)}</div>
        <div class="fcard-footer">
          <span class="sub-count">${f.subs.length} sub-formatos</span>
          <span class="toggle-arrow">▾</span>
        </div>
      </div>
      <div class="sub-list">${subsHtml}</div>`;

    grid.appendChild(div);
  });
}

render();
